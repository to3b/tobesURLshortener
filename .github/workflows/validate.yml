name: Validate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check frontend JavaScript
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          html = Path("index.html").read_text()
          match = re.search(r"<script>\s*(.*?)\s*</script>", html, re.S)
          if not match:
              raise SystemExit("No inline script found")
          Path("/tmp/index.js").write_text(match.group(1))
          PY
          node --check /tmp/index.js
      - name: Check Worker
        working-directory: worker
        run: npm run check
