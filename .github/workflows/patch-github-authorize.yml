name: Patch GitHub authorize parameters

on:
  push:
    branches:
      - fix/github-authorize-params

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/github-authorize-params
      - name: Remove unsupported authorization parameter
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("worker/src/index.js")
          content = path.read_text()
          old = '  authorize.searchParams.set("repository_id", env.GITHUB_REPOSITORY_ID);\n'
          if old not in content:
              raise SystemExit("Expected authorization parameter was not found")
          path.write_text(content.replace(old, "", 1))
          PY
      - name: Run Worker tests
        working-directory: worker
        run: npm test
      - name: Commit patch and remove temporary workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/patch-github-authorize.yml
          rm -f .github/patch-trigger-auth
          git add worker/src/index.js .github/patch-trigger-auth
          git commit -m "Fix GitHub App authorization request"
          git push
