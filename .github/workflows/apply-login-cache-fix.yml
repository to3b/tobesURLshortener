name: Apply login cache-busting fix

on:
  push:
    branches:
      - fix/login-cache-bust

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/login-cache-bust
          fetch-depth: 0

      - name: Update login URL and remove temporary workflow
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("index.html")
          text = path.read_text(encoding="utf-8")
          old = '        function login() { window.location.assign(`${AUTH_API}/auth/login`); }'
          new = '        function login() { window.location.assign(`${AUTH_API}/auth/login?cb=${Date.now()}`); }'
          if text.count(old) != 1:
              raise SystemExit(f"Expected one login handler, found {text.count(old)}")
          path.write_text(text.replace(old, new), encoding="utf-8")
          PY
          rm .github/workflows/apply-login-cache-fix.yml

      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/apply-login-cache-fix.yml
          git commit -m "Add cache-buster to GitHub login URL"
          git push origin HEAD:fix/login-cache-bust
