<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#111827" />
    <title>t-b.es</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #090d16;
        color: #f8fafc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, #172033 0, transparent 42%),
          #090d16;
      }

      main {
        width: min(100%, 620px);
        padding: 38px;
        border: 1px solid #273244;
        border-radius: 20px;
        background: rgba(15, 23, 42, 0.82);
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(14px);
      }

      .eyebrow {
        margin: 0 0 16px;
        color: #93c5fd;
        font-size: 0.82rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.6rem, 10vw, 5rem);
        letter-spacing: -0.06em;
        line-height: 0.95;
      }

      p {
        max-width: 48ch;
        margin: 22px 0 0;
        color: #b8c2d3;
        font-size: 1.05rem;
        line-height: 1.7;
      }

      code {
        padding: 0.18rem 0.42rem;
        border: 1px solid #334155;
        border-radius: 6px;
        background: #111827;
        color: #dbeafe;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Custom redirects</p>
      <h1>t-b.es</h1>
      <p>
        A small, private redirect service. Configured links use the format
        <code>name.t-b.es</code>.
      </p>
    </main>
  </body>
</html>
